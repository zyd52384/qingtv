name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Free APK
        run: ./gradlew assembleFreeRelease

      - name: Build Pro APK
        run: ./gradlew assembleProRelease

      - name: Upload Free APK
        uses: actions/upload-artifact@v4
        with:
          name: QingKanTV-Free
          path: app/build/outputs/apk/free/release/*.apk

      - name: Upload Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: QingKanTV-Pro
          path: app/build/outputs/apk/pro/release/*.apk
